<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure CSS Layout</title>
  <style>
    /* Reset some default styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: #0d6efd; /* blue */
      color: white;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 1rem;
      font-weight: bold;
    }

    .navbar a:hover {
      color: #ffc107; /* yellow */
    }

    .menu {
      display: flex;
      gap: 1rem;
    }

    /* Main Section */
    .main-section {
      text-align: center;
      padding: 2rem 1rem;
      background-color: #f8f9fa; 
    }

    .main-section img {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
      border-radius: 10px;
    }

    .main-section p {
      margin-top: 1rem;
      font-size: 1.2rem;
      color: #333;
    }

    /* Lower Gallery */
    .lower-gallery {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 2rem 1rem;
      flex-wrap: wrap;
    }

    .lower-gallery img {
      width: 32%;
      border-radius: 10px;
      object-fit: cover;
    }

    /* Responsive */
    /* @media (max-width: 768px) {
      .lower-gallery img {
        width: 100%;
        margin-bottom: 1rem;
      }
      .menu {
        flex-direction: column;
        gap: 0.5rem;
      }
    } */
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">MyLogo</div>
    <div class="menu">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <!-- Main Section -->
  <section class="main-section">
    <img src="https://via.placeholder.com/1200x500" alt="Main Image">
    <p>This is a beautiful full-width section showcasing the main image.</p>
  </section>

  <!-- Lower Gallery -->
  <section class="lower-gallery">
    <img src="https://via.placeholder.com/400x300" alt="Gallery Image 1">
    <img src="https://via.placeholder.com/400x300" alt="Gallery Image 2">
    <img src="https://via.placeholder.com/400x300" alt="Gallery Image 3">
  </section>

</body>
</html>
